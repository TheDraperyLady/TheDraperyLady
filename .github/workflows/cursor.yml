# Patchline client-site Cursor Cloud Agent workflow.
#
# Triggered when a maintainer adds the `approve-for-cursor` label to an issue
# created by patchline-worker. Cursor reads the issue body, works in a Cloud
# Agent VM, and opens a PR.

name: Cursor Cloud Agent (approve-for-cursor)

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  cursor:
    if: github.event.label.name == 'approve-for-cursor'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    concurrency:
      group: cursor-issue-${{ github.event.issue.number }}
      cancel-in-progress: false

    steps:
      - name: Mark issue as agent-running
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['agent-running'],
            });

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22.13.1'

      - name: Install Cursor SDK
        run: npm install --no-save @cursor/sdk

      - name: Run Cursor Cloud Agent
        id: cursor
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ vars.CURSOR_MODEL || 'auto' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY_JSON: ${{ toJSON(github.event.issue.body) }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REPOSITORY_URL: ${{ github.event.repository.html_url }}
        run: |
          node --input-type=module <<'NODE'
          import { Agent, CursorAgentError } from '@cursor/sdk';
          import { appendFileSync } from 'node:fs';
          import { randomUUID } from 'node:crypto';

          const issueBody = JSON.parse(process.env.ISSUE_BODY_JSON || '""') || '';
          const issueNumber = process.env.ISSUE_NUMBER;
          const issueTitle = process.env.ISSUE_TITLE;
          const repositoryUrl = process.env.REPOSITORY_URL;
          const startingRef = process.env.DEFAULT_BRANCH || 'main';
          const model = process.env.CURSOR_MODEL || 'auto';

          function setOutput(name, value) {
            const delimiter = `patchline_${randomUUID()}`;
            appendFileSync(process.env.GITHUB_OUTPUT, `${name}<<${delimiter}\n${value || ''}\n${delimiter}\n`);
          }

          async function commentOnIssue(body) {
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const response = await fetch(
              `${process.env.GITHUB_API_URL}/repos/${owner}/${repo}/issues/${issueNumber}/comments`,
              {
                method: 'POST',
                headers: {
                  Accept: 'application/vnd.github+json',
                  Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                  'X-GitHub-Api-Version': '2022-11-28',
                },
                body: JSON.stringify({ body }),
              },
            );
            if (!response.ok) {
              throw new Error(`Failed to comment on issue: ${response.status} ${await response.text()}`);
            }
          }

          let agent;
          let agentUrl = '';

          try {
            agent = await Agent.create({
              apiKey: process.env.CURSOR_API_KEY,
              model: { id: model },
              cloud: {
                repos: [{ url: repositoryUrl, startingRef }],
                autoCreatePR: true,
                skipReviewerRequest: true,
              },
            });

            agentUrl = `https://cursor.com/agents/${agent.agentId}`;
            setOutput('agent_url', agentUrl);
            await commentOnIssue(`Cursor Cloud Agent started: ${agentUrl}`);

            const prompt = [
              'You are implementing a website change request from Patchline.',
              '',
              'Read the GitHub issue below in full. Follow every constraint listed in its',
              '"Constraints for the agent" section. Make the smallest possible diff.',
              '',
              `Open exactly one pull request against ${startingRef}. The PR title must start`,
              `with "[client-request]" and the PR body must include "Closes #${issueNumber}".`,
              '',
              'If the request is ambiguous, do not guess. Leave a final response explaining',
              'the clarification needed so this workflow can report it on the issue.',
              '',
              'Issue title:',
              issueTitle,
              '',
              'Issue body:',
              issueBody,
              '',
            ].join('\n');

            const run = await agent.send(prompt);
            setOutput('run_id', run.id);
            const result = await run.wait();

            setOutput('status', result.status);
            setOutput('final_message', result.result || '');

            const prUrls = (result.git?.branches || [])
              .map((branch) => branch.prUrl)
              .filter(Boolean);
            setOutput('pr_urls', prUrls.join('\n'));

            if (result.status !== 'finished' || prUrls.length === 0) {
              throw new Error(`Cursor run finished with status=${result.status}, prs=${prUrls.length}`);
            }
          } catch (err) {
            if (err instanceof CursorAgentError) {
              console.error(`Cursor startup failed: ${err.message}; retryable=${err.isRetryable}`);
              process.exitCode = err.isRetryable ? 75 : 1;
            } else {
              throw err;
            }
          } finally {
            if (agent) await agent[Symbol.asyncDispose]();
          }
          NODE

      - name: Comment with Cursor result
        if: success()
        uses: actions/github-script@v8
        env:
          AGENT_URL: ${{ steps.cursor.outputs.agent_url }}
          PR_URLS: ${{ steps.cursor.outputs.pr_urls }}
        with:
          script: |
            const agentUrl = process.env.AGENT_URL || '';
            const prUrls = (process.env.PR_URLS || '').split('\n').filter(Boolean);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                `Cursor Cloud Agent completed: ${agentUrl}`,
                '',
                ...prUrls.map((url) => `PR: ${url}`),
              ].join('\n'),
            });

      - name: On failure, mark blocked and comment
        if: failure() || cancelled()
        uses: actions/github-script@v8
        env:
          AGENT_URL: ${{ steps.cursor.outputs.agent_url }}
          FINAL_MESSAGE: ${{ steps.cursor.outputs.final_message }}
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['blocked'],
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.issue.number,
              name: 'agent-running',
            }).catch(() => {});

            const agentUrl = process.env.AGENT_URL || '';
            const finalMessage = (process.env.FINAL_MESSAGE || '').trim();
            const body = [
              'Cursor Cloud Agent run failed, was cancelled, or completed without opening a PR.',
              agentUrl ? `Cursor agent: ${agentUrl}` : null,
              'Workflow logs: '
                + `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`
                + `/actions/runs/${context.runId}`,
              finalMessage ? `\nCursor final message:\n\n${finalMessage}` : null,
            ].filter(Boolean).join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
